# Test-only configuration (this file shadows main application.properties on the test classpath)

spring.application.name=glasseshop

# Keep the same SQL Server connection used by the project
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=SWP-Glasses;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=12345
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# Ensure the schema stays in sync with JPA entities during tests
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.servlet.encoding.charset=UTF-8
spring.servlet.encoding.enabled=true
spring.servlet.encoding.force=true

